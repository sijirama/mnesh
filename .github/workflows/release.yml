name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          out="dist/mnesh_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "$out"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "$out/mnesh" \
            ./cmd/mnesh
          cp README.md "$out/" 2>/dev/null || true
          cp mnesh_uninstall "$out/" 2>/dev/null || true
          tar -czf "${out}.tar.gz" -C dist "mnesh_${VERSION}_${GOOS}_${GOARCH}"
          ( cd dist && sha256sum "mnesh_${VERSION}_${GOOS}_${GOARCH}.tar.gz" > "mnesh_${VERSION}_${GOOS}_${GOARCH}.tar.gz.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: mnesh_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
